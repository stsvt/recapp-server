              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  results:
                    type: integer
                    example: 2
                  data:
                    type: object
                    properties:
                      movies:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              example: 60d0fe4f5311236168a109ca
                            user:
                              type: string
                              example: 60d0fe4f5311236168a109ca
                            movie:
                              $ref: '#/components/schemas/DBMovieObject'
                            activityType:
                              type: string
                              enum: [ liked, watched ]
                              example: liked
                            createdAt:
                              type: string
                              format: date-time
                              example: 2026-01-01T12:00:00.000Z
