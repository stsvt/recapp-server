  /api/v1/tmdb:
    get:
      summary: Отримати всі фільми
      description: Універсальний ендпоінт для пошуку та фільтрації фільмів за різними критеріями (жанри, рік, рейтинг тощо). Результати кешуються в Redis на 1 тиждень.
      tags: [ TMDB ]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Номер сторінки для пагінації
        - in: query
          name: with_genres
          schema:
            type: string
            example: "28,53"
          description: Кома-сепарований список ID жанрів (наприклад, 28 для Бойовика, 53 для Трилера)
        - in: query
          name: sort_by
          schema:
            type: string
            example: popularity.desc
          description: Параметр сортування (наприклад, popularity.desc, vote_average.desc, primary_release_date.desc)
        - in: query
          name: primary_release_year
          schema:
            type: integer
            example: 2026
          description: Фільтрація за роком випуску
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  source:
                    type: string
                    description: Вказує на джерело даних (присутнє, якщо дані завантажено з кешу)
                    example: cache
                  data:
                    type: object
                    properties:
                      movies:
                        type: object
                        properties:
                          page:
                            type: integer
                            example: 1
                          results:
                            type: array
                            items:
                              $ref: '#/components/schemas/MovieObject'
        "400":
          description: Bad Request

  /api/v1/tmdb/{id}:
    get:
      summary: Отримати розширену інформацію про фільм
      description: Повертає повну інформацію про фільм за його ID, включаючи акторський склад (cast), знімальну групу (crew), відеоролики (трейлери) та рекомендовані фільми.
      tags: [ TMDB ]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1426964
          description: Унікальний ідентифікатор фільму в базі TMDB
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      movie:
                        $ref: '#/components/schemas/ExtendedMovieObject'
        "400":
          description: Bad Request
        "404":
          description: Not Found

  /api/v1/activity:
    post:
      summary: Вподобати або зберегти фільм
      description: Дозволяє користувачу відзначити фільм як вподобаний або збережений для перегляду пізніше. Вимагає авторизації.
      tags: [ Activity ]
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tmdbId
                - activityType
              properties:
                tmdbId:
                  type: string
                  example: 1236153
                activityType:
                  type: string
                  enum: [ liked, watched ]
                  example: liked
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      isActive:
                        type: boolean
                        example: true
                      message:
                        type: string
                        example: Movie added to liked list
                      likesCount:
                        type: integer
                        example: 1
                      watchesCount:
                        type: integer
                        example: 0
        "404":
          description: Not Found
        "400":
          description: Bad Request

    get:
      summary: Отримати вподобані та збережені фільми користувача
      description: Повертає список фільмів, які користувач відзначив як вподобані або збережені для перегляду. Вимагає авторизації.
      tags: [ Activity ]
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  results:
                    type: integer
                    example: 2
                  data:
                    type: object
                    properties:
                      movies:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              example: 60d0fe4f5311236168a109ca
                            user:
                              type: string
                              example: 60d0fe4f5311236168a109ca
                            movie:
                              type: object
                              $ref: '#/components/schemas/DBMovieObject'
                            activityType:
                              type: string
                              enum: [ liked, watched ]
                              example: liked
                            createdAt:
                              type: string
                              format: date-time
                              example: 2026-01-01T12:00:00.000Z
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "404":
          description: Not Found

  /api/v1/activity/status/{id}:
    get:
      summary: Перевірити статус вподобання або збереження фільму
      description: Дозволяє користувачу перевірити, чи відзначив він певний фільм як вподобаний або збережений для перегляду. Вимагає авторизації.
      tags: [ Activity ]
      security:
        - bearerAuth: [ ]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: 1236153
          description: TMDB ID фільму для перевірки статусу
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      liked:
                        type: boolean
                        example: true
                      watched:
                        type: boolean
                        example: false
        "400":
          description: Bad Request
        "401":
          description: Unauthorized

