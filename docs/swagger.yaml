  /api/v1/activity/status/{tmdbId}:
    get:
      summary: Перевірити статус вподобання, перегляду та реакції фільму
      description: Дозволяє користувачу перевірити, чи відзначив він певний фільм як вподобаний або збережений для перегляду, а також переглянути свою поточну емоційну реакцію та загальні лічильники реакцій фільму. Вимагає авторизації.
      tags: [ Activity ]
      security:
        - bearerAuth: [ ]
      parameters:
        - in: path
          name: tmdbId
          required: true
          schema:
            type: string
            example: 1236153
          description: TMDB ID фільму для перевірки статусу
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      liked:
                        type: boolean
                        example: true
                      watched:
                        type: boolean
                        example: false
                      currentReaction:
                        type: string
                        nullable: true
                        example: fire
                        description: Тип поточної реакції користувача (якщо є)
                      reactionCounts:
                        type: object
                        description: Загальні лічильники різних емоційних реакцій користувачів на фільм
                        properties:
                          fire:
                            type: integer
                            example: 5
                          mindblown:
                            type: integer
                            example: 2
                          crying:
                            type: integer
                            example: 0
                          laughing:
                            type: integer
                            example: 1
                          eyesWithHearts:
                            type: integer
                            example: 10
        "400":
          description: Bad Request
        "401":
          description: Unauthorized

  /api/v1/activity/reaction:
    post:
      summary: Додати, видалити або змінити реакцію на фільм
      description: Універсальний ендпоінт для роботи з реакціями. Якщо реакції немає — створює її. Якщо користувач надсилає ту саму реакцію — видаляє її. Якщо надсилає іншу — оновлює її. Автоматично перераховує лічильники реакцій у моделі фільму. Вимагає авторизації.
      tags: [ Activity ]
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tmdbId
                - reactionType
              properties:
                tmdbId:
                  type: string
                  example: 1236153
                  description: TMDB ID фільму
                reactionType:
                  type: string
                  enum: [ fire, mindblown, crying, laughing, eyesWithHearts ]
                  example: fire
                  description: Тип реакції, яку користувач хоче поставити
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Reaction added
                      currentReaction:
                        type: string
                        nullable: true
                        example: fire
                        description: Поточна реакція після виконання запиту (null, якщо видалено)
                      reactionCounts:
                        type: object
                        description: Оновлені загальні лічильники реакцій на фільм
                        properties:
                          fire:
                            type: integer
                            example: 6
                          mindblown:
                            type: integer
                            example: 2
                          crying:
                            type: integer
                            example: 0
                          laughing:
                            type: integer
                            example: 1
                          eyesWithHearts:
                            type: integer
                            example: 10
        "400":
          description: Bad Request
        "401":
          description: Unauthorized

  /api/v1/reviews/{movieId}:
    get:
      summary: Отримати всі відгуки до фільму
      description: Повертає масив усіх відгуків для конкретного фільму. Якщо фільм ще не має відгуків або не існує в локальній базі, повертається порожній масив.
      tags: [ Reviews ]
      parameters:
        - in: path
          name: movieId
          required: true
          schema:
            type: string
          description: TMDB ID фільму (наприклад, 1426964)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  results:
                    type: integer
                    example: 1
                  data:
                    type: object
                    properties:
                      reviews:
                        type: array
                        items:
                          $ref: '#/components/schemas/ReviewObject'
        "404":
          description: Not Found

    post:
      summary: Створити відгук до фільму
      description: Створює новий відгук. Якщо фільм ще не збережений у локальній базі, він автоматично створюється на основі TMDB ID. Вимагає авторизації.
      tags: [ Reviews ]
      security:
        - bearerAuth: [ ]
      parameters:
        - in: path
          name: movieId
          required: true
          schema:
            type: string
          description: TMDB ID фільму
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - review
                - rating
              properties:
                review:
                  type: string
                  example: Чудовий фільм, дуже сподобався!
                rating:
                  type: number
                  example: 8.5
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      review:
                        $ref: '#/components/schemas/ReviewObject'
        "400":
          description: Bad Request (Відсутній текст або рейтинг)
        "401":
          description: Unauthorized

  /api/v1/reviews/{reviewId}:
    patch:
      summary: Оновити власний відгук
      description: Дозволяє користувачу змінити текст відгуку або його рейтинг. Користувач може редагувати лише власні відгуки. Вимагає авторизації.
      tags: [ Reviews ]
      security:
        - bearerAuth: [ ]
      parameters:
        - in: path
          name: reviewId
          required: true
          schema:
            type: string
          description: MongoDB ID самого відгуку
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                review:
                  type: string
                  example: Оновлений текст відгуку. Після другого перегляду фільм здався ще кращим.
                rating:
                  type: number
                  example: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      review:
                        $ref: '#/components/schemas/ReviewObject'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (Спроба відредагувати чужий відгук)
        "404":
          description: Review not found

    delete:
      summary: Видалити (приховати) власний відгук
      description:
        Здійснює soft-delete відгуку (встановлює `active` - `false`). Вимагає авторизації.
      tags: [ Reviews ]
      security:
        - bearerAuth: [ ]
      parameters:
        - in: path
          name: reviewId
          required: true
          schema:
            type: string
          description: MongoDB ID відгуку
      responses:
        "204":
          description: No Content (Відгук успішно видалено)
        "401":
          description: Unauthorized
  /api/v1/movies:
    get:
      summary: Отримати всі збережені фільми
      description: Повертає список усіх фільмів, які були збережені в локальну базу даних MongoDB (наприклад, коли хтось залишав відгук або додавав фільм у збережені).
      tags: [ Movies ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  results:
                    type: integer
                    example: 5
                  data:
                    type: object
                    properties:
                      movies:
                        type: array
                        items:
                          $ref: '#/components/schemas/DBMovieObject'
        "404":
          description: No movies found

  /api/v1/movies/{id}:
    get:
      summary: Отримати фільм з локальної БД за ID
      description: Повертає детальну інформацію про збережений фільм за його MongoDB `_id`. Цей ендпоінт також автоматично "підтягує" (populate) усі відгуки, які належать цьому фільму.
      tags: [ Movies ]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: 699c2f4c41fdc4732f8f8b48
          description: Локальний MongoDB _id фільму (НЕ TMDB ID!)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      movie:
                        $ref: '#/components/schemas/DBMovieObject'
        "404":
          description: No movie found with that ID

  /api/v1/friends/sendRequest:
    post:
      summary: Надіслати запит у друзі
      description: |
        Надсилає запит у друзі іншому користувачу за його ID, переданим у тілі запиту. Якщо цей користувач раніше вже надіслав вам запит, дружба приймається автоматично. 
        **Побічні ефекти:** - Створює запис у колекції Notifications.
        - Відправляє Socket.IO подію `new_friend_request` (або `friend_request_accepted`), якщо отримувач зараз онлайн.
      tags: [ Friends ]
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  example: 699450d95d1fa52694992929
                  description: Локальний MongoDB ID користувача, якому надсилається запит
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Friend request sent successfully
                  data:
                    type: object
                    properties:
                      friendship:
                        $ref: '#/components/schemas/FriendshipObject'
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Friend request accepted automatically (mutual request)
                  data:
                    type: object
                    properties:
                      friendship:
                        $ref: '#/components/schemas/FriendshipObject'
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "404":
          description: Not Found
  /api/v1/friends/acceptRequest:
    patch:
      summary: Прийняти запит у друзі
      description: |
        Змінює статус вхідного запиту в друзі від вказаного користувача з `pending` на `accepted`. Вимагає авторизації.
        **Побічні ефекти:**
        - Створює запис у колекції Notifications.
        - Відправляє Socket.IO подію `friend_request_accepted` ініціатору запиту, якщо він зараз онлайн.
      tags: [ Friends ]
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  example: 699890f398a5f149e2d2dc73
                  description: Локальний MongoDB ID користувача, який надіслав вам запит
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Friend request accepted
                  data:
                    type: object
                    properties:
                      friendship:
                        $ref: '#/components/schemas/FriendshipObject'
        "401":
          description: Unauthorized
        "404":
          description: Not Found
  /api/v1/friends/rejectRequest:
    delete:
      summary: Відхилити запит у друзі
      description: Видаляє вхідний запит у друзі від вказаного користувача. Працює лише для запитів зі статусом `pending`. Вимагає авторизації (поточним користувачем має бути отримувач запиту).
      tags: [ Friends ]
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  example: 699890f398a5f149e2d2dc73
                  description: Локальний MongoDB ID користувача, який надіслав вам запит
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
        "404":
          description: Not Found
  /api/v1/friends/removeFriend:
    delete:
      summary: Видалити користувача з друзів
      description: Видаляє існуючу дружбу (статус `accepted`) між поточним користувачем та вказаним користувачем, незалежно від того, хто був ініціатором запиту. Вимагає авторизації.
      tags: [ Friends ]
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  example: 699890f398a5f149e2d2dc73
                  description: Локальний MongoDB ID друга, якого потрібно видалити
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
  /api/v1/friends/incomingRequests:
    get:
      summary: Отримати вхідні запити в друзі
      description: Повертає список усіх нерозглянутих (зі статусом `pending`) запитів у друзі, надісланих поточному користувачу. Поле `requester` автоматично "розгортається" і містить базову інформацію про відправника (ім'я, email, фото). Вимагає авторизації.
      tags: [ Friends ]
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  results:
                    type: integer
                    example: 1
                  data:
                    type: object
                    properties:
                      requests:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              example: 60d21b4667d0d8992e610c85
                            requester:
                              type: object
                              description: Дані користувача, який надіслав запит
                              properties:
                                _id:
                                  type: string
                                  example: 699450d95d1fa52694992928
                                name:
                                  type: string
                                  example: taras
                                email:
                                  type: string
                                  example: taras@example.com
                                photo:
                                  type: string
                                  example: default.jpg
                            recipient:
                              type: string
                              example: 699450d95d1fa52694992929
                            status:
                              type: string
                              example: pending
                            createdAt:
                              type: string
                              format: date-time
                              example: 2026-03-01T12:00:00.000Z
                            updatedAt:
                              type: string
                              format: date-time
                              example: 2026-03-01T12:00:00.000Z
        "401":
          description: Unauthorized
  /api/v1/friends:
    get:
      summary: Отримати список друзів
      description: Повертає список усіх підтверджених друзів (де статус `accepted`) для поточного користувача. У відповіді повертається масив об'єктів самих друзів (з полями `_id`, `name`, `email`, `photo`), а не об'єкти записів дружби. Вимагає авторизації.
      tags: [ Friends ]
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  results:
                    type: integer
                    example: 3
                  data:
                    type: object
                    properties:
                      friends:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              example: 699450d95d1fa52694992929
                            name:
                              type: string
                              example: vika
                            email:
                              type: string
                              example: vika@example.com
                            photo:
                              type: string
                              example: default.jpg
        "401":
          description: Unauthorized
        "404":
          description: Not Found
  /api/v1/notifications:
    get:
      summary: Отримати всі сповіщення користувача
      description: Повертає список сповіщень для поточного авторизованого користувача. Відсортовано за датою створення (від найновіших). Поле `sender` автоматично заповнюється базовою інформацією про відправника (ім'я та фото). Вимагає авторизації.
      tags: [ Notifications ]
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  results:
                    type: integer
                    example: 1
                  data:
                    type: object
                    properties:
                      notifications:
                        type: array
                        items:
                          $ref: '#/components/schemas/NotificationObject'
        "401":
          description: Unauthorized

  /api/v1/notifications/readAll:
    patch:
      summary: Позначити всі сповіщення як прочитані
      description: Змінює статус `isRead` на `true` для всіх непрочитаних сповіщень поточного авторизованого користувача. Вимагає авторизації.
      tags: [ Notifications ]
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: All notifications marked as read
        "401":
          description: Unauthorized

  /api/v1/notifications/{id}/read:
    patch:
      summary: Позначити сповіщення як прочитане
      description: Оновлює статус конкретного сповіщення (властивість `isRead` стає `true`). Користувач може оновлювати лише ті сповіщення, де він є отримувачем. Вимагає авторизації.
      tags: [ Notifications ]
      security:
        - bearerAuth: [ ]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: 69a586e8ea53dec632215d9f
          description: Локальний MongoDB ID самого сповіщення
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      notification:
                        $ref: '#/components/schemas/NotificationObject'
        "401":
          description: Unauthorized
        "404":
          description: Not Found

