  /api/v1/tmdb/nowPlaying:
    get:
      summary: Отримати фільми, що зараз у прокаті
      description: Повертає список фільмів, які наразі показують у кінотеатрах. Підтримує пагінацію. Результати можуть кешуватися в Redis.
      tags: [ TMDB ]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Номер сторінки для пагінації
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  source:
                    type: string
                    description: Вказує на джерело даних (присутнє, якщо дані завантажено з кешу)
