      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  source:
                    type: string
                    description: Вказує на джерело даних (присутнє, якщо дані завантажено з кешу)
                    example: cache
                  data:
                    type: object
                    properties:
                      movies:
                        type: object
                        properties:
                          dates:
                            type: object
                            description: Період, в який очікуються прем'єри
                            properties:
                              maximum:
                                type: string
                                format: date
                                example: 2026-03-18
                              minimum:
                                type: string
                                format: date
                                example: 2026-02-25
                          page:
                            type: integer
                            example: 1
                          results:
                            type: array
                            items:
                              $ref: '#/components/schemas/MovieObject'
  /api/v1/tmdb/search:
    get:
      summary: Пошук фільмів за назвою
      description: Шукає фільми у базі TMDB за ключовим словом.
      tags: [ TMDB ]
