                  type: string
                  example: 1236153
                activityType:
                  type: string
                  enum: [ liked, watched ]
                  example: liked
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      isActive:
                        type: boolean
                        example: true
                      message:
                        type: string
                        example: Movie added to liked list
                      likesCount:
                        type: integer
                        example: 1
                      watchesCount:
                        type: integer
                        example: 0
        "404":
          description: Not Found
        "400":
          description: Bad Request

    get:
      summary: Отримати вподобані та збережені фільми користувача
      description: Повертає список фільмів, які користувач відзначив як вподобані або збережені для перегляду. Вимагає авторизації.
